name: Daily NJ Foreclosure Scrape

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python main.py
        env:
          LOOKBACK_DAYS: '180'
          OUTPUT_CSV: 'sample_essex_foreclosures.csv'

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sample_essex_foreclosures.csv
          git diff --cached --quiet || git commit -m "Daily update: Essex County lis pendens $(date +'%Y-%m-%d')"
          git pull --rebase
          git push
